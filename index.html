<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Global Recognitions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Premium Glassmorphism */
        .glass-ui {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Animated Recognition Badge */
        .ethos-badge {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        /* Tangy Pulse Marker */
        .pulse-icon {
            width: 24px; height: 24px;
            background: #6366f1;
            border: 4px solid white;
            border-radius: 50%;
            animation: ring-pulse 2s infinite;
        }
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen w-full relative">
        
        <!-- SIDEBAR -->
        <aside class="absolute top-6 left-6 bottom-6 w-80 md:w-96 glass-ui z-[1001] rounded-[2.5rem] flex flex-col overflow-hidden">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <span class="text-2xl text-white">💎</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight">ETHOS<span class="text-indigo-600">MAPPER</span></h1>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400 leading-none">Global Value Registry</p>
                    </div>
                </div>

                <!-- Live Search -->
                <div class="relative bg-white/50 border border-slate-200 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500/20 transition-all">
                    <input type="text" id="search" placeholder="Locate a nation..." 
                        class="w-full bg-transparent py-4 px-12 text-sm font-medium outline-none">
                    <span class="absolute left-5 top-4">🔍</span>
                </div>
            </div>

            <!-- Country List -->
            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 no-scrollbar pb-10">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- THE RECOGNITION PANEL (The Tangy Part) -->
        <div id="panel" class="absolute bottom-10 right-10 w-80 glass-ui p-8 rounded-[3rem] z-[1001] transition-all transform translate-y-20 opacity-0 pointer-events-none scale-90">
            <div class="flex justify-center mb-6">
                <span id="p-flag" class="text-7xl filter drop-shadow-xl"></span>
            </div>
            
            <div class="text-center mb-6">
                <span id="p-ethos" class="ethos-badge mb-3 inline-block">Universal Value</span>
                <h2 id="p-name" class="text-3xl font-extrabold text-slate-900 tracking-tight leading-none">Country</h2>
                <p id="p-cap" class="text-indigo-500 text-xs font-bold uppercase tracking-widest mt-2">Capital City</p>
            </div>

            <div class="space-y-4 bg-white/50 rounded-[2rem] p-6 border border-white">
                <div class="flex justify-between">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">Population</span>
                    <span id="p-pop" class="text-slate-900 font-bold text-xs font-mono">--</span>
                </div>
                <div class="flex justify-between border-t border-slate-100 pt-3">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">Global Role</span>
                    <span id="p-role" class="text-indigo-600 font-bold text-[10px] uppercase text-right leading-tight">--</span>
                </div>
            </div>
            
            <button onclick="closePanel()" class="mt-6 w-full py-4 text-slate-400 hover:text-indigo-600 text-[10px] font-extrabold uppercase tracking-widest transition-all">Dismiss Record</button>
        </div>

        <!-- MAIN MAP -->
        <main class="flex-1 bg-slate-100">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. RECOGNITION ENGINE (The Logic for Unique Values)
        const getEthos = (country) => {
            const name = country.name.common;
            const region = country.region;

            // Manual unique recognitions for major nations
            const registry = {
                "India": { badge: "Knowledge Hub", role: "Spiritual & Technological Foundation" },
                "Brazil": { badge: "Lungs of Earth", role: "Guardian of Global Biodiversity" },
                "Switzerland": { badge: "Neutral Core", role: "Sanctuary of Global Diplomacy" },
                "Japan": { badge: "Future Heritage", role: "Mastery of Tradition & Technology" },
                "USA": { badge: "Innovation Engine", role: "Frontier of Global Digital Culture" },
                "Norway": { badge: "Ethical Sovereign", role: "Model for Social Welfare & Peace" },
                "Egypt": { badge: "Ancient Cradle", role: "Foundation of Human Civilization" },
                "Australia": { badge: "Wild Frontier", role: "Guardian of Unique Ecosystems" },
                "Germany": { badge: "Precision Lab", role: "Engineering Excellence & Industry" },
                "France": { badge: "Cultural Beacon", role: "Heart of Art, Culinary & Liberty" }
            };

            if (registry[name]) return registry[name];

            // Automatic Recognition by Region
            if (region === 'Africa') return { badge: "Rising Horizon", role: "Emerging Market of Human Potential" };
            if (region === 'Europe') return { badge: "Historic Union", role: "Preservation of Western Arts & Law" };
            if (region === 'Americas') return { badge: "Dynamic Frontier", role: "Economic & Natural Powerhouse" };
            if (region === 'Asia') return { badge: "Global Workshop", role: "Powerhouse of Production & Tech" };
            if (region === 'Oceania') return { badge: "Blue Sanctuary", role: "Guardian of Marine Life & Peace" };

            return { badge: "Global Node", role: "Critical Contributor to World Ethos" };
        };

        let countries = [];
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        
        // Premium Voyager Map Style
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
            } catch (e) {
                console.error("API Link Error");
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="group flex items-center gap-4 p-5 rounded-[2rem] bg-white/40 border border-transparent hover:border-indigo-200 hover:bg-white transition-all cursor-pointer">
                    <span class="text-3xl filter grayscale group-hover:grayscale-0 transition-all">${c.flag}</span>
                    <div>
                        <h3 class="text-sm font-extrabold text-slate-800">${c.name.common}</h3>
                        <p class="text-[9px] text-indigo-500 font-bold uppercase tracking-widest">${getEthos(c).badge}</p>
                    </div>
                </div>
            `).join('');
        }

        let marker = null;

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;

            map.flyTo(c.latlng, 5, { duration: 2.5, easeLinearity: 0.25 });

            const ethos = getEthos(c);
            const panel = document.getElementById('panel');
            panel.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none', 'scale-90');
            
            document.getElementById('p-flag').innerText = c.flag;
            document.getElementById('p-ethos').innerText = ethos.badge;
            document.getElementById('p-name').innerText = c.name.common;
            document.getElementById('p-cap').innerText = c.capital?.[0] || 'Remote Territory';
            document.getElementById('p-pop').innerText = c.population.toLocaleString();
            document.getElementById('p-role').innerText = ethos.role;

            if (marker) map.removeLayer(marker);
            const icon = L.divIcon({ className: 'pulse-icon', iconSize: [24, 24] });
            marker = L.marker(c.latlng, { icon }).addTo(map);
        }

        function closePanel() {
            document.getElementById('panel').classList.add('translate-y-20', 'opacity-0', 'pointer-events-none', 'scale-90');
            if (marker) map.removeLayer(marker);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = countries.filter(c => c.name.common.toLowerCase().includes(val));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
