<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Sovereign Global Registry</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            font-family: 'Outfit', sans-serif;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Particle Canvas */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            width: 100%; 
            z-index: 2;
            opacity: 0;
            animation: fadeInMap 2s ease-out forwards;
        }

        @keyframes fadeInMap {
            to { opacity: 1; }
        }
        
        .ui-container { 
            position: relative; 
            z-index: 1000; 
            pointer-events: none; 
            height: 100vh; 
            display: flex;
        }
        .interactive { pointer-events: auto; }

        /* Enhanced Glass UI with Glow */
        .glass-ui {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(249, 115, 22, 0.3);
            box-shadow: 
                0 0 40px rgba(249, 115, 22, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .glass-ui::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #f97316, #fb923c, #f97316);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }

        .glass-ui:hover::before {
            opacity: 0.5;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Sidebar entrance animation */
        aside {
            animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Logo with 3D rotation */
        .logo-container {
            perspective: 1000px;
        }

        .logo-icon {
            transform-style: preserve-3d;
            animation: float3D 6s ease-in-out infinite;
        }

        @keyframes float3D {
            0%, 100% {
                transform: rotateY(0deg) rotateX(0deg) translateY(0px);
            }
            25% {
                transform: rotateY(15deg) rotateX(5deg) translateY(-5px);
            }
            50% {
                transform: rotateY(0deg) rotateX(0deg) translateY(-10px);
            }
            75% {
                transform: rotateY(-15deg) rotateX(-5deg) translateY(-5px);
            }
        }

        /* Enhanced pulse marker with rings */
        .pulse-marker {
            width: 24px; 
            height: 24px; 
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(249, 115, 22, 0.8),
                0 0 40px rgba(249, 115, 22, 0.4);
            animation: pulse-ring 2s infinite, markerFloat 3s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0% { 
                box-shadow: 
                    0 0 20px rgba(249, 115, 22, 0.8),
                    0 0 40px rgba(249, 115, 22, 0.4),
                    0 0 0 0 rgba(249, 115, 22, 0.7);
            }
            50% {
                box-shadow: 
                    0 0 30px rgba(249, 115, 22, 1),
                    0 0 60px rgba(249, 115, 22, 0.6),
                    0 0 0 20px rgba(249, 115, 22, 0);
            }
            100% { 
                box-shadow: 
                    0 0 20px rgba(249, 115, 22, 0.8),
                    0 0 40px rgba(249, 115, 22, 0.4),
                    0 0 0 0 rgba(249, 115, 22, 0);
            }
        }

        @keyframes markerFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }

        /* Button with electric effect */
        .btn-tangy {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(249, 115, 22, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-tangy::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-tangy:hover::before {
            left: 100%;
        }

        .btn-tangy:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 8px 30px rgba(249, 115, 22, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .btn-tangy:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Country cards with stagger animation */
        .country-card {
            opacity: 0;
            transform: translateX(-20px);
            animation: slideInCard 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .country-card:nth-child(1) { animation-delay: 0.1s; }
        .country-card:nth-child(2) { animation-delay: 0.15s; }
        .country-card:nth-child(3) { animation-delay: 0.2s; }
        .country-card:nth-child(4) { animation-delay: 0.25s; }
        .country-card:nth-child(5) { animation-delay: 0.3s; }
        .country-card:nth-child(n+6) { animation-delay: 0.35s; }

        @keyframes slideInCard {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .country-card {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
        }

        .country-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), rgba(251, 146, 60, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .country-card:hover {
            transform: translateX(8px) scale(1.02);
            background: rgba(249, 115, 22, 0.1) !important;
            border-color: rgba(249, 115, 22, 0.5) !important;
            box-shadow: 
                0 8px 30px rgba(249, 115, 22, 0.3),
                inset 0 0 20px rgba(249, 115, 22, 0.1);
        }

        .country-card:hover::after {
            opacity: 1;
        }

        /* Enhanced panel with dramatic entrance */
        #panel {
            animation: panelEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes panelEntrance {
            from {
                transform: translateY(100%) rotate(5deg) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
        }

        #panel.active {
            animation: panelPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes panelPop {
            0% {
                transform: translateY(20px) scale(0.9);
                opacity: 0;
            }
            50% {
                transform: translateY(-10px) scale(1.05);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* Glowing text effect */
        .glow-text {
            text-shadow: 
                0 0 10px rgba(249, 115, 22, 0.5),
                0 0 20px rgba(249, 115, 22, 0.3),
                0 0 30px rgba(249, 115, 22, 0.2);
            animation: textGlow 3s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(249, 115, 22, 0.5),
                    0 0 20px rgba(249, 115, 22, 0.3);
            }
            50% {
                text-shadow: 
                    0 0 20px rgba(249, 115, 22, 0.8),
                    0 0 30px rgba(249, 115, 22, 0.5),
                    0 0 40px rgba(249, 115, 22, 0.3);
            }
        }

        /* Orbital elements */
        .orbit {
            position: absolute;
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .orbit-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
        }

        .orbit-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
            animation-duration: 15s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .orbit-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.8);
            top: 50%;
            left: 50%;
            margin: -4px 0 0 -4px;
        }

        .no-scrollbar::-webkit-scrollbar { 
            width: 6px;
        }

        .no-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .no-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(249, 115, 22, 0.5);
            border-radius: 10px;
        }

        .no-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(249, 115, 22, 0.7);
        }

        /* Search input glow */
        #search {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: white;
            transition: all 0.3s;
        }

        #search::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #search:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(249, 115, 22, 0.6);
            box-shadow: 
                0 0 20px rgba(249, 115, 22, 0.3),
                inset 0 0 10px rgba(249, 115, 22, 0.1);
        }

        /* Stat box animation */
        .stat-box {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            transition: all 0.3s;
        }

        .stat-box:hover {
            background: rgba(249, 115, 22, 0.15);
            border-color: rgba(249, 115, 22, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(249, 115, 22, 0.2);
        }

        /* Flag animation */
        #p-flag {
            animation: flagWave 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes flagWave {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-5deg) scale(1.05); }
            75% { transform: rotate(5deg) scale(1.05); }
        }

        /* Badge pulse */
        .badge-pulse {
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(249, 115, 22, 0);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <!-- Particle System -->
    <canvas id="particles"></canvas>

    <div id="map"></div>

    <div class="ui-container">
        <!-- SIDEBAR -->
        <aside class="interactive m-6 w-80 md:w-96 glass-ui rounded-[2.5rem] flex flex-col overflow-hidden">
            <!-- Orbital decorations -->
            <div class="orbit orbit-1"><div class="orbit-dot"></div></div>
            <div class="orbit orbit-2"><div class="orbit-dot"></div></div>

            <div class="p-8 pb-4">
                <div class="flex items-center gap-3 mb-6 logo-container">
                    <div class="logo-icon w-14 h-14 bg-gradient-to-tr from-orange-500 via-orange-600 to-rose-500 rounded-2xl flex items-center justify-center shadow-2xl" style="box-shadow: 0 0 30px rgba(249, 115, 22, 0.5);">
                        <span class="text-3xl">🌍</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-black tracking-tight leading-none text-white glow-text" style="font-family: 'Orbitron', monospace;">
                            ETHOS<span class="text-orange-500">MAPPER</span>
                        </h1>
                        <p class="text-[9px] uppercase tracking-[0.25em] font-bold text-orange-400 mt-1" style="font-family: 'Space Mono', monospace;">
                            Sovereign Global Registry
                        </p>
                    </div>
                </div>

                <input type="text" id="search" placeholder="🔍 Locate a nation..." 
                    class="w-full rounded-2xl py-4 px-6 text-sm font-medium outline-none mb-4">

                <button onclick="teleport()" class="btn-tangy w-full py-4 rounded-2xl text-[11px] font-black tracking-[0.2em]" style="font-family: 'Orbitron', monospace;">
                    🎲 SURPRISE ME
                </button>
            </div>

            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 no-scrollbar pb-10">
                <p class="text-center text-xs text-orange-400 animate-pulse" style="font-family: 'Space Mono', monospace;">
                    ⚡ Syncing global nodes...
                </p>
            </div>
        </aside>

        <!-- INFO PANEL -->
        <div id="panel" class="interactive absolute bottom-10 right-10 w-80 glass-ui p-8 rounded-[3rem] transition-all transform translate-y-20 opacity-0 pointer-events-none">
            <div class="text-center">
                <span id="p-flag" class="text-7xl mb-4 block"></span>
                <span id="p-ethos" class="badge-pulse bg-gradient-to-r from-orange-500 to-orange-600 text-white px-4 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest inline-block" style="font-family: 'Space Mono', monospace;">
                    Recognition
                </span>
                <h2 id="p-name" class="text-3xl font-black text-white mt-3 glow-text" style="font-family: 'Orbitron', monospace;">
                    Country
                </h2>
                <p id="p-cap" class="text-orange-400 text-[11px] font-bold uppercase tracking-widest mt-2" style="font-family: 'Space Mono', monospace;">
                    Capital
                </p>
            </div>
            <div class="mt-6 space-y-3">
                <div class="stat-box rounded-2xl p-5">
                    <div class="flex justify-between items-center">
                        <span class="text-orange-400 text-[10px] font-bold tracking-wider" style="font-family: 'Space Mono', monospace;">POPULATION</span>
                        <span id="p-pop" class="text-white font-bold text-sm" style="font-family: 'Orbitron', monospace;">--</span>
                    </div>
                </div>
                <div class="stat-box rounded-2xl p-5">
                    <div class="flex justify-between items-start">
                        <span class="text-orange-400 text-[10px] font-bold tracking-wider" style="font-family: 'Space Mono', monospace;">ETHOS ROLE</span>
                        <span id="p-role" class="text-orange-300 font-bold text-[10px] text-right uppercase max-w-[60%]" style="font-family: 'Space Mono', monospace;">--</span>
                    </div>
                </div>
            </div>
            <button onclick="closePanel()" class="mt-6 w-full text-orange-400 text-[10px] font-bold uppercase tracking-widest hover:text-orange-300 transition-colors" style="font-family: 'Space Mono', monospace;">
                ✕ Dismiss
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 60;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(249, 115, 22, ${this.opacity})`;
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(249, 115, 22, 0.8)';
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
                      });

        const getEthos = (name) => {
            const registry = {
                "India": { badge: "Knowledge Hub", role: "Official Boundary: Unified Cultural Core" },
                "Brazil": { badge: "Lungs of Earth", role: "Guardian of Biodiversity" },
                "Japan": { badge: "Future Heritage", role: "Tradition & Technology Mastery" }
            };
            return registry[name] || { badge: "Global Node", role: "Contributor to World Ethos" };
        };

        let countries = [];
        let marker = null;

        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
            } catch (e) {
                console.error("Link interrupted");
            }
        }

        function render(data) {
            document.getElementById('list').innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="group flex items-center gap-4 p-5 rounded-[2rem] bg-white/50 hover:bg-white border border-transparent hover:border-orange-200 transition-all cursor-pointer">
                    <span class="text-3xl">${c.flag}</span>
                    <div><h3 class="text-sm font-extrabold text-slate-800">${c.name.common}</h3><p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">${getEthos(c.name.common).badge}</p></div>
                </div>
            `).join('');
        }

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;
            map.flyTo(c.latlng, name === 'India' ? 5 : 6, { duration: 2 });
            
            const ethos = getEthos(c.name.common);
            const panel = document.getElementById('panel');
            panel.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            
            document.getElementById('p-flag').innerText = c.flag;
            document.getElementById('p-ethos').innerText = ethos.badge;
            document.getElementById('p-name').innerText = c.name.common;
            document.getElementById('p-cap').innerText = c.capital?.[0] || 'Unknown';
            document.getElementById('p-pop').innerText = c.population.toLocaleString();
            document.getElementById('p-role').innerText = ethos.role;

            if (marker) map.removeLayer(marker);
            marker = L.marker(c.latlng, { icon: L.divIcon({ className: 'pulse-marker', iconSize: [20, 20] }) }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }

        function closePanel() {
            document.getElementById('panel').classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            if (marker) map.removeLayer(marker);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(countries.filter(c => c.name.common.toLowerCase().includes(val)));
        });

        window.onload = () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
            init();
        };
    </script>
</body>
</html>
