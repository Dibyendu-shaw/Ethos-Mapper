<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Sovereign Global Registry</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        html, body { height: 100%; margin: 0; background-color: #e2e8f0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .ui-container { position: relative; z-index: 1000; pointer-events: none; height: 100vh; display: flex; }
        .interactive { pointer-events: auto; }

        .glass-ui {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .pulse-marker {
            width: 20px; height: 20px; background: #f97316;
            border: 3px solid white; border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .btn-tangy {
            background: #0f172a; color: white; transition: all 0.2s;
        }
        .btn-tangy:hover { background: #f97316; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        <!-- SIDEBAR -->
        <aside class="interactive m-6 w-80 md:w-96 glass-ui rounded-[2.5rem] flex flex-col overflow-hidden">
            <div class="p-8 pb-4">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 bg-gradient-to-tr from-orange-500 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                        <span class="text-2xl text-white">🟠</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight leading-none text-slate-900">ETHOS<span class="text-orange-500">MAPPER</span></h1>
                        <p class="text-[9px] uppercase tracking-[0.2em] font-bold text-slate-400 mt-1">Sovereign Global Registry</p>
                    </div>
                </div>

                <input type="text" id="search" placeholder="Locate a nation..." 
                    class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-6 text-sm font-medium outline-none mb-4 focus:border-orange-500">

                <button onclick="teleport()" class="btn-tangy w-full py-4 rounded-2xl text-[10px] font-extrabold tracking-[0.2em]">
                    🎲 SURPRISE ME
                </button>
            </div>

            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 no-scrollbar pb-10">
                <p class="text-center text-xs text-slate-400 animate-pulse">Syncing nodes...</p>
            </div>
        </aside>

        <!-- INFO PANEL -->
        <div id="panel" class="interactive absolute bottom-10 right-10 w-80 glass-ui p-8 rounded-[3rem] transition-all transform translate-y-20 opacity-0 pointer-events-none">
            <div class="text-center">
                <span id="p-flag" class="text-6xl mb-4 block"></span>
                <span id="p-ethos" class="bg-orange-500 text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Recognition</span>
                <h2 id="p-name" class="text-3xl font-extrabold text-slate-900 mt-2">Country</h2>
                <p id="p-cap" class="text-orange-500 text-[10px] font-bold uppercase tracking-widest mt-1">Capital</p>
            </div>
            <div class="mt-6 space-y-3 bg-orange-50/50 rounded-3xl p-5 border border-orange-100">
                <div class="flex justify-between"><span class="text-slate-400 text-[10px] font-bold">POPULATION</span><span id="p-pop" class="text-slate-900 font-bold text-xs font-mono">--</span></div>
                <div class="flex justify-between pt-2 border-t border-orange-100"><span class="text-slate-400 text-[10px] font-bold">ETHOS ROLE</span><span id="p-role" class="text-orange-600 font-bold text-[10px] text-right uppercase">--</span></div>
            </div>
            <button onclick="closePanel()" class="mt-6 w-full text-slate-400 text-[10px] font-bold uppercase tracking-widest">Dismiss</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Setup Map with a clean, high-performance layer
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22, 78], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. SOVEREIGN INDIA BOUNDARY (Forcing Official Borders)
        // We use a specific GeoJSON for the official Indian boundary
        fetch('https://raw.githubusercontent.com/datameet/maps/master/Country/india-composite.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#f97316", weight: 3, fillOpacity: 0.05, fillColor: "#f97316" }
                }).addTo(map);
            });

        const getEthos = (name) => {
            const registry = {
                "India": { badge: "Knowledge Hub", role: "Official Boundary: Unified Cultural Core" },
                "Brazil": { badge: "Lungs of Earth", role: "Guardian of Biodiversity" },
                "Japan": { badge: "Future Heritage", role: "Tradition & Technology Mastery" }
            };
            return registry[name] || { badge: "Global Node", role: "Contributor to World Ethos" };
        };

        let countries = [];
        let marker = null;

        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
            } catch (e) {
                console.error("Link interrupted");
            }
        }

        function render(data) {
            document.getElementById('list').innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="group flex items-center gap-4 p-5 rounded-[2rem] bg-white/50 hover:bg-white border border-transparent hover:border-orange-200 transition-all cursor-pointer">
                    <span class="text-3xl">${c.flag}</span>
                    <div><h3 class="text-sm font-extrabold text-slate-800">${c.name.common}</h3><p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">${getEthos(c.name.common).badge}</p></div>
                </div>
            `).join('');
        }

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;
            map.flyTo(c.latlng, name === 'India' ? 5 : 6, { duration: 2 });
            
            const ethos = getEthos(c.name.common);
            const panel = document.getElementById('panel');
            panel.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            
            document.getElementById('p-flag').innerText = c.flag;
            document.getElementById('p-ethos').innerText = ethos.badge;
            document.getElementById('p-name').innerText = c.name.common;
            document.getElementById('p-cap').innerText = c.capital?.[0] || 'Unknown';
            document.getElementById('p-pop').innerText = c.population.toLocaleString();
            document.getElementById('p-role').innerText = ethos.role;

            if (marker) map.removeLayer(marker);
            marker = L.marker(c.latlng, { icon: L.divIcon({ className: 'pulse-marker', iconSize: [20, 20] }) }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }

        function closePanel() {
            document.getElementById('panel').classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            if (marker) map.removeLayer(marker);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(countries.filter(c => c.name.common.toLowerCase().includes(val)));
        });

        window.onload = () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
            init();
        };
    </script>
</body>
</html>
