<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Global View</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        #map { height: 100vh; width: 100%; transition: filter 0.5s ease; }
        
        /* Modern Glass UI */
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        /* The "Tangy" Marker */
        .custom-marker {
            width: 20px; height: 20px;
            background: #ff3e00; /* Tangy Orange-Red */
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 62, 0, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 62, 0, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(255, 62, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 62, 0, 0); }
        }

        /* Search Bar focus effect */
        .search-focus:focus-within {
            border-color: #ff3e00;
            box-shadow: 0 0 0 4px rgba(255, 62, 0, 0.1);
        }

        .country-card:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="overflow-hidden text-slate-800">

    <div class="flex h-screen w-full relative">
        
        <!-- SIDEBAR -->
        <aside class="absolute top-6 left-6 bottom-6 w-80 md:w-96 glass-sidebar z-[1001] rounded-[2.5rem] flex flex-col overflow-hidden transition-all">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-gradient-to-tr from-orange-500 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-200 rotate-3">
                        <span class="text-2xl">🛰️</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight text-slate-900 leading-none">ETHOS</h1>
                        <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-orange-500">Global Registry</p>
                    </div>
                </div>

                <!-- Search -->
                <div class="relative search-focus bg-slate-100/50 border border-slate-200 rounded-[1.5rem] transition-all overflow-hidden mb-4">
                    <input type="text" id="search" placeholder="Find a country..." 
                        class="w-full bg-transparent py-4 px-12 text-sm outline-none font-medium">
                    <span class="absolute left-5 top-4">🔍</span>
                </div>

                <button onclick="teleport()" class="w-full py-3 bg-slate-900 text-white rounded-2xl text-[11px] font-bold tracking-widest hover:bg-orange-600 transition-all shadow-xl shadow-slate-200">
                    🎲 SURPRISE ME
                </button>
            </div>

            <!-- Scrollable Country List -->
            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 pb-8">
                <!-- Data goes here -->
            </div>
        </aside>

        <!-- INFO MODAL -->
        <div id="info-modal" class="absolute top-6 right-6 w-72 glass-sidebar p-8 rounded-[2.5rem] z-[1001] transition-all transform translate-y-10 opacity-0 pointer-events-none scale-95">
            <div id="modal-flag" class="text-6xl mb-4"></div>
            <h2 id="modal-name" class="text-2xl font-extrabold text-slate-900">Country</h2>
            <p id="modal-cap" class="text-orange-500 text-xs font-bold uppercase tracking-widest mb-6">Capital</p>
            
            <div class="space-y-4 border-t border-slate-100 pt-6">
                <div class="flex justify-between">
                    <span class="text-slate-400 text-[11px] font-bold uppercase">Population</span>
                    <span id="modal-pop" class="text-slate-900 font-bold text-sm">--</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400 text-[11px] font-bold uppercase">Region</span>
                    <span id="modal-reg" class="text-slate-900 font-bold text-sm">--</span>
                </div>
            </div>
            
            <button onclick="closeModal()" class="mt-8 w-full py-3 border-2 border-slate-100 hover:border-orange-500 rounded-2xl text-[10px] font-bold text-slate-400 hover:text-orange-500 transition-all">CLOSE VIEW</button>
        </div>

        <!-- MAIN MAP -->
        <main class="flex-1">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let countries = [];
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        
        // VIVID VOYAGER TILES (Beautiful oceans and clear land)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
            } catch (e) {
                console.error("API Error");
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="country-card group flex items-center gap-4 p-4 rounded-[1.5rem] bg-white/40 border border-transparent transition-all cursor-pointer">
                    <span class="text-3xl">${c.flag}</span>
                    <div class="overflow-hidden">
                        <h3 class="text-sm font-bold text-slate-800 truncate">${c.name.common}</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${c.region}</p>
                    </div>
                </div>
            `).join('');
        }

        let marker = null;

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;

            map.flyTo(c.latlng, 5, { duration: 2 });

            const modal = document.getElementById('info-modal');
            modal.style.opacity = '1';
            modal.style.transform = 'translateY(0) scale(1)';
            modal.style.pointerEvents = 'auto';

            document.getElementById('modal-flag').innerText = c.flag;
            document.getElementById('modal-name').innerText = c.name.common;
            document.getElementById('modal-cap').innerText = c.capital?.[0] || 'Unknown';
            document.getElementById('modal-pop').innerText = c.population.toLocaleString();
            document.getElementById('modal-reg').innerText = c.region;

            if (marker) map.removeLayer(marker);
            
            // Tangy Pulse Marker
            const icon = L.divIcon({ className: 'custom-marker', iconSize: [20, 20] });
            marker = L.marker(c.latlng, { icon }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }

        function closeModal() {
            const modal = document.getElementById('info-modal');
            modal.style.opacity = '0';
            modal.style.transform = 'translateY(10px) scale(0.95)';
            modal.style.pointerEvents = 'none';
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = countries.filter(c => c.name.common.toLowerCase().includes(val));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
