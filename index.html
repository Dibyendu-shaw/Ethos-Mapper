<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Global Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --neon-cyan: #22d3ee; --neon-emerald: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        h1, .font-tech { font-family: 'Orbitron', sans-serif; }
        
        #map { height: 100vh; width: 100%; background: #020617 !important; }
        
        /* Glassmorphism UI */
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Tangy Animations */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, var(--neon-cyan), transparent);
            animation: scan 3s linear infinite;
        }

        .pulse-marker {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 z-[9999] bg-slate-950 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="font-tech text-cyan-500 tracking-widest animate-pulse">BOOTING GLOBAL SYSTEMS...</h2>
    </div>

    <div class="flex h-screen w-full relative">
        
        <!-- LEFT SIDEBAR: THE COMMAND CENTER -->
        <aside class="absolute top-6 left-6 bottom-6 w-80 md:w-96 glass z-[1001] rounded-[2rem] flex flex-col overflow-hidden">
            <div class="scan-line"></div>
            
            <!-- Branding -->
            <div class="p-8 pb-4">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-cyan-500/20 rounded-xl border border-cyan-500/50">
                        <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    </div>
                    <h1 class="text-xl font-bold tracking-widest text-white uppercase">Ethos<span class="text-cyan-400">Mapper</span></h1>
                </div>

                <!-- Live Search -->
                <div class="relative group">
                    <input type="text" id="search" placeholder="Locate country..." 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 px-12 text-sm focus:outline-none focus:border-cyan-400 transition-all text-white">
                    <span class="absolute left-4 top-4 text-slate-500">🔍</span>
                </div>
                
                <button onclick="teleport()" class="mt-4 w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 rounded-2xl font-tech text-[10px] tracking-[0.2em] transition-all shadow-lg shadow-cyan-900/20">
                    🎲 RANDOM TELEPORT
                </button>
            </div>

            <!-- Scrollable Country List -->
            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3">
                <!-- Countries injected here -->
            </div>

            <!-- Footer Meta -->
            <div class="p-6 border-t border-white/5 bg-slate-950/50">
                <div class="flex justify-between text-[9px] font-tech text-slate-500 uppercase tracking-widest">
                    <span>Sat-Linked: <span class="text-emerald-400">Active</span></span>
                    <span>v2.0.4 Global</span>
                </div>
            </div>
        </aside>

        <!-- DATA MODAL (Right Side) -->
        <div id="data-panel" class="absolute top-6 right-6 w-72 glass p-8 rounded-[2rem] z-[1001] transition-all transform translate-x-[120%] opacity-0">
            <button onclick="closePanel()" class="absolute top-4 right-4 text-slate-500 hover:text-white">✕</button>
            <div id="panel-flag" class="text-5xl mb-4 text-center"></div>
            <h2 id="panel-name" class="font-tech text-xl text-center mb-1">Country</h2>
            <p id="panel-capital" class="text-cyan-400 text-[10px] text-center uppercase tracking-[0.3em] mb-6 border-b border-white/10 pb-4">Capital</p>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 text-[10px] uppercase font-bold">Pop. Density</span>
                    <span id="panel-pop" class="text-white font-tech text-xs">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 text-[10px] uppercase font-bold">Hemisphere</span>
                    <span id="panel-region" class="text-white font-tech text-xs">N/A</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 text-[10px] uppercase font-bold">Currency</span>
                    <span id="panel-curr" class="text-white font-tech text-xs">N/A</span>
                </div>
            </div>

            <div class="mt-8 p-4 bg-cyan-500/10 rounded-xl border border-cyan-500/20">
                <p class="text-[10px] text-cyan-300 leading-relaxed italic">"A key node in the global ethos network, contributing unique cultural and ecological value."</p>
            </div>
        </div>

        <!-- MAIN MAP -->
        <main class="flex-1">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let countries = [];
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        
        // Premium Cyber-Tilemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Fetch All Countries (Package)
        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital,currencies');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                alert("Global Link Interrupted. Refreshing...");
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common}')" class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-cyan-500/50 hover:bg-cyan-500/10 cursor-pointer transition-all">
                    <span class="text-2xl">${c.flag}</span>
                    <div class="overflow-hidden">
                        <h3 class="text-xs font-bold text-white truncate">${c.name.common}</h3>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest">${c.region}</p>
                    </div>
                </div>
            `).join('');
        }

        let activeMarker = null;

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;

            if (activeMarker) map.removeLayer(activeMarker);

            map.flyTo(c.latlng, 5, { duration: 2.5 });

            // UI Feedback
            const panel = document.getElementById('data-panel');
            panel.classList.remove('translate-x-[120%]', 'opacity-0');
            document.getElementById('panel-flag').innerText = c.flag;
            document.getElementById('panel-name').innerText = c.name.common;
            document.getElementById('panel-capital').innerText = c.capital ? c.capital[0] : 'Remote';
            document.getElementById('panel-pop').innerText = c.population.toLocaleString();
            document.getElementById('panel-region').innerText = c.region;
            
            const curr = c.currencies ? Object.values(c.currencies)[0].name : 'Universal';
            document.getElementById('panel-curr').innerText = curr;

            activeMarker = L.circleMarker(c.latlng, {
                radius: 20, color: '#22d3ee', fillColor: '#22d3ee', fillOpacity: 0.2, weight: 2, className: 'pulse-marker'
            }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }

        function closePanel() {
            document.getElementById('data-panel').classList.add('translate-x-[120%]', 'opacity-0');
            if (activeMarker) map.removeLayer(activeMarker);
        }

        // Search Filter
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = countries.filter(c => c.name.common.toLowerCase().includes(val));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
