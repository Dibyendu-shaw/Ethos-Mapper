<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | 3D Global Intelligence</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        :root {
            --dark: #0f172a;
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        header { 
            background: var(--dark); color: white; padding: 40px 20px; text-align: center;
        }

        /* Container for the 3D Globe */
        #globeViz {
            width: 100%;
            height: 400px;
            background-color: #000;
            border-bottom: 4px solid var(--primary);
            cursor: grab;
        }
        #globeViz:active { cursor: grabbing; }

        .search-container { text-align: center; padding: 30px 20px; margin-top: -30px; position: relative; z-index: 10; }
        
        input { 
            width: 100%; max-width: 500px; padding: 15px; border-radius: 8px;
            border: 1px solid #cbd5e1; font-size: 1rem; outline: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .container { 
            max-width: 1200px; margin: auto; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; padding: 20px; 
        }

        .card { 
            background: var(--card); border-radius: 8px; padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-top: 4px solid var(--primary);
        }

        .card h2 { margin: 0 0 10px 0; font-size: 1.4rem; }
        .flag-emoji { font-size: 3.5rem; margin-bottom: 5px; line-height: 1; }

        .section-title { 
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; 
            color: var(--primary); font-weight: 800; margin-top: 15px; display: block;
        }

        .grid-info { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;
            background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 0.85rem;
        }
        
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem;}
    </style>
</head>
<body>

<header>
    <h1 style="margin-bottom: 5px;">ETHOS MAPPER</h1>
    <p style="margin-top: 0; color: #94a3b8;">Interactive Global Data</p>
</header>

<div id="globeViz"></div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search by Country or Capital...">
</div>

<div class="container" id="mainGrid">
    </div>

<footer>
    <p>ETHOS MAPPER | Built for Humanity by an Analyst</p>
</footer>

<script>
    // THE OFFLINE DATABASE (Now with Latitude and Longitude for the map!)
    const countriesData = [
        { name: "India", lat: 20.5937, lng: 78.9629, flag: "🇮🇳", capital: "New Delhi", region: "Asia", pop: "1.42 Billion", langs: "Hindi, English" },
        { name: "Japan", lat: 36.2048, lng: 138.2529, flag: "🇯🇵", capital: "Tokyo", region: "Asia", pop: "125 Million", langs: "Japanese" },
        { name: "France", lat: 46.2276, lng: 2.2137, flag: "🇫🇷", capital: "Paris", region: "Europe", pop: "67.9 Million", langs: "French" },
        { name: "Brazil", lat: -14.2350, lng: -51.9253, flag: "🇧🇷", capital: "Brasília", region: "Americas", pop: "215.3 Million", langs: "Portuguese" },
        { name: "United States", lat: 37.0902, lng: -95.7129, flag: "🇺🇸", capital: "Washington, D.C.", region: "Americas", pop: "333.2 Million", langs: "English" },
        { name: "South Africa", lat: -30.5595, lng: 22.9375, flag: "🇿🇦", capital: "Pretoria", region: "Africa", pop: "59.8 Million", langs: "Zulu, English" },
        { name: "Australia", lat: -25.2744, lng: 133.7751, flag: "🇦🇺", capital: "Canberra", region: "Oceania", pop: "26.0 Million", langs: "English" },
        { name: "Egypt", lat: 26.8206, lng: 30.8025, flag: "🇪🇬", capital: "Cairo", region: "Africa", pop: "110.9 Million", langs: "Arabic" },
        { name: "Canada", lat: 56.1304, lng: -106.3468, flag: "🇨🇦", capital: "Ottawa", region: "Americas", pop: "38.9 Million", langs: "English, French" },
        { name: "Germany", lat: 51.1657, lng: 10.4515, flag: "🇩🇪", capital: "Berlin", region: "Europe", pop: "83.2 Million", langs: "German" },
        { name: "Mexico", lat: 23.6345, lng: -102.5528, flag: "🇲🇽", capital: "Mexico City", region: "Americas", pop: "127.5 Million", langs: "Spanish" },
        { name: "Italy", lat: 41.8719, lng: 12.5674, flag: "🇮🇹", capital: "Rome", region: "Europe", pop: "58.9 Million", langs: "Italian" }
    ];

    // 1. // 1. INITIALIZE THE 3D GLOBE
    const GlobeViz = Globe()
        (document.getElementById('globeViz'))
        // Switched to a bright, daytime Earth texture
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg') 
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        // Switched background to match your deep-blue header
        .backgroundColor('#0f172a') 
        .pointsData(countriesData) 
        .pointAltitude(0.05)
        .pointColor(() => '#fdbb2d') // Changed dots to a bright yellow/gold to pop against the blue
        .pointRadius(0.5)
        .pointLabel('name');

    // Spin the globe slowly automatically
    GlobeViz.controls().autoRotate = true;
    GlobeViz.controls().autoRotateSpeed = 1.5;

    // 2. BUILD THE DATA GRID
    countriesData.sort((a, b) => a.name.localeCompare(b.name));
    const grid = document.getElementById('mainGrid');

    countriesData.forEach(country => {
        let cardHTML = `
            <div class="card">
                <div class="flag-emoji">${country.flag}</div>
                <h2>${country.name}</h2>
                
                <span class="section-title">Essential Vitals</span>
                <div class="grid-info">
                    <div>🏛️ <b>Capital:</b> ${country.capital}</div>
                    <div>🌍 <b>Region:</b> ${country.region}</div>
                    <div>👥 <b>Pop:</b> ${country.pop}</div>
                    <div>🗣️ <b>Lang:</b> ${country.langs}</div>
                </div>
            </div>
        `;
        grid.innerHTML += cardHTML;
    });

    // 3. SEARCH FUNCTION
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let val = this.value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>

</body>
</html>
