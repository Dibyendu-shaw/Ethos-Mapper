<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Global Social Impact</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        #map { height: 100vh; width: 100%; }
        
        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: white;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .leaflet-popup-tip { background: #1e293b; }

        /* Smooth Sidebar Transitions */
        .project-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .project-card:hover { transform: translateY(-2px); background-color: rgba(30, 41, 59, 0.8); }
    </style>
</head>
<body class="text-slate-100 overflow-hidden">

    <div class="flex flex-col md:flex-row h-screen w-full">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-96 bg-slate-900/95 backdrop-blur-xl border-r border-slate-800 flex flex-col z-[1001] shadow-2xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                        <span class="font-bold text-white text-lg">🌎</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight text-white">Ethos Mapper</h1>
                        <p class="text-emerald-400 text-[10px] uppercase tracking-widest font-bold">Global Impact Registry</p>
                    </div>
                </div>
                
                <p class="text-slate-400 text-sm leading-relaxed mt-4 mb-8">
                    A planetary visualization of social ethos, ecological restoration, and community-led development projects.
                </p>

                <div class="space-y-4 overflow-y-auto max-h-[60vh] pr-2" id="project-list">
                    <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-4">Featured Global Projects</h2>
                    <!-- Project cards will be injected here by JavaScript -->
                </div>
            </div>

            <div class="mt-auto p-6 border-t border-slate-800 bg-slate-950/50">
                <div class="flex items-center justify-between">
                    <p class="text-[10px] text-slate-500 font-medium">Curated by Dibyendu Shaw</p>
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                </div>
            </div>
        </aside>

        <!-- MAP -->
        <main class="flex-1 relative">
            <div id="map"></div>
            
            <!-- Global Legend -->
            <div class="absolute bottom-8 left-8 z-[1000] bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700 hidden md:block">
                <h4 class="text-xs font-bold text-slate-300 mb-2 uppercase italic">Map Legend</h4>
                <div class="flex items-center gap-4 text-[11px]">
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-emerald-400"></i> Ecological</span>
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-cyan-400"></i> Social</span>
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-amber-400"></i> Economic</span>
                </div>
            </div>
        </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. INITIALIZE MAP (Global View)
        // [20, 10] is the center, Zoom level 2.5 shows almost all continents
        const map = L.map('map', {
            zoomControl: false,
            minZoom: 2,
            maxBounds: [[-90, -180], [90, 180]]
        }).setView([20, 10], 2.5);

        // 2. DARK THEME TILES
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; Ethos Mapper'
        }).addTo(map);

        // 3. GLOBAL DATASET
        const projects = [
            {
                id: 1,
                name: "Jharkhand Restoration",
                location: "India",
                coords: [23.8327, 86.6690],
                type: "Ecological",
                color: "#10b981",
                desc: "Tribal community-led reforestation and water harvesting."
            },
            {
                id: 2,
                name: "Amazon Canopy Watch",
                location: "Brazil",
                coords: [-3.4653, -62.2159],
                type: "Ecological",
                color: "#10b981",
                desc: "Satellite monitoring of indigenous lands in the Amazon."
            },
            {
                id: 3,
                name: "Sahara Green Wall",
                location: "Senegal",
                coords: [14.4974, -14.4524],
                type: "Ecological",
                color: "#10b981",
                desc: "Combatting desertification through sustainable agroforestry."
            },
            {
                id: 4,
                name: "Rhine Water Quality",
                location: "Germany",
                coords: [50.1109, 8.6821],
                type: "Social",
                color: "#22d3ee",
                desc: "Urban river cleaning and public health initiative."
            },
            {
                id: 5,
                name: "Outback Solar Hub",
                location: "Australia",
                coords: [-25.2744, 133.7751],
                type: "Economic",
                color: "#fbbf24",
                desc: "Renewable energy transition for remote communities."
            }
        ];

        // 4. RENDER PROJECTS & MARKERS
        const projectList = document.getElementById('project-list');

        projects.forEach(project => {
            // Create Sidebar Card
            const card = document.createElement('div');
            card.className = "project-card p-4 bg-slate-800/30 border border-slate-700/50 rounded-xl cursor-pointer";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <h3 class="font-semibold text-white text-sm">${project.name}</h3>
                    <span class="text-[9px] font-bold px-2 py-0.5 rounded-full" style="background:${project.color}20; color:${project.color}">${project.location}</span>
                </div>
                <p class="text-[11px] text-slate-400 mt-2 leading-relaxed">${project.desc}</p>
            `;
            
            // Add click event to "Fly To" location
            card.onclick = () => {
                map.flyTo(project.coords, 8, { duration: 2 });
            };
            projectList.appendChild(card);

            // Create Map Marker
            const marker = L.circleMarker(project.coords, {
                radius: 8,
                fillColor: project.color,
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            marker.bindPopup(`
                <div style="padding: 5px">
                    <b style="color:${project.color}; font-size:14px">${project.name}</b><br/>
                    <small style="color:#94a3b8">${project.type} Project</small>
                    <p style="margin-top:8px; font-size:12px">${project.desc}</p>
                </div>
            `);
        });

        // 5. CUSTOM UI CONTROLS
        L.control.zoom({ position: 'bottomright' }).addTo(map);

    </script>
</body>
</html>
