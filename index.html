<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Global Values</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fefce8; color: #0f172a; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .glass-ui {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(249, 115, 22, 0.15);
        }

        .ethos-badge {
            background: linear-gradient(135deg, #f97316 0%, #f43f5e 100%);
            color: white; padding: 5px 14px; border-radius: 99px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
        }

        .pulse-icon {
            width: 20px; height: 20px; background: #f97316;
            border: 3px solid white; border-radius: 50%;
            animation: ring-pulse 2s infinite;
        }
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .btn-tangy {
            background: #0f172a; color: white; transition: all 0.3s ease;
        }
        .btn-tangy:hover {
            background: #f97316; transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen w-full relative">
        
        <!-- SIDEBAR -->
        <aside class="absolute top-6 left-6 bottom-6 w-80 md:w-96 glass-ui z-[1001] rounded-[2.5rem] flex flex-col overflow-hidden">
            <div class="p-8 pb-4">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-gradient-to-tr from-orange-500 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                        <span class="text-2xl text-white">🟠</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight leading-none">ETHOS<span class="text-orange-500">MAPPER</span></h1>
                        <p class="text-[9px] uppercase tracking-[0.2em] font-bold text-slate-400 mt-1">Sovereign Global Registry</p>
                    </div>
                </div>

                <div class="relative bg-white border border-slate-100 rounded-2xl overflow-hidden focus-within:border-orange-400 transition-all mb-4">
                    <input type="text" id="search" placeholder="Locate a nation..." class="w-full bg-transparent py-4 px-12 text-sm font-medium outline-none">
                    <span class="absolute left-5 top-4">🔍</span>
                </div>

                <button onclick="teleport()" class="btn-tangy w-full py-4 rounded-2xl text-[10px] font-extrabold tracking-[0.2em]">
                    🎲 SURPRISE ME
                </button>
            </div>

            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 no-scrollbar pb-10"></div>
        </aside>

        <!-- DATA PANEL -->
        <div id="panel" class="absolute bottom-10 right-10 w-80 glass-ui p-8 rounded-[3rem] z-[1001] transition-all transform translate-y-20 opacity-0 pointer-events-none scale-90">
            <div class="flex justify-center mb-6"><span id="p-flag" class="text-7xl filter drop-shadow-2xl"></span></div>
            <div class="text-center mb-6">
                <span id="p-ethos" class="ethos-badge mb-3 inline-block">Value</span>
                <h2 id="p-name" class="text-3xl font-extrabold text-slate-900 tracking-tight leading-none">Country</h2>
                <p id="p-cap" class="text-orange-500 text-xs font-bold uppercase tracking-widest mt-2">Capital</p>
            </div>
            <div class="space-y-4 bg-white/60 rounded-[2rem] p-6 border border-orange-50/50">
                <div class="flex justify-between items-center"><span class="text-slate-400 text-[10px] font-bold uppercase">Population</span><span id="p-pop" class="text-slate-900 font-bold text-xs font-mono">--</span></div>
                <div class="flex justify-between border-t border-orange-100 pt-3 gap-4"><span class="text-slate-400 text-[10px] font-bold uppercase">Global Role</span><span id="p-role" class="text-orange-600 font-bold text-[10px] uppercase text-right leading-tight">--</span></div>
            </div>
            <button onclick="closePanel()" class="mt-6 w-full py-2 text-slate-400 hover:text-orange-600 text-[10px] font-extrabold uppercase">Dismiss</button>
        </div>

        <main class="flex-1"><div id="map"></div></main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const getEthos = (country) => {
            const registry = {
                "India": { badge: "Knowledge Hub", role: "Official Boundaries: Unified Cultural & Spiritual Core" },
                "Brazil": { badge: "Lungs of Earth", role: "Guardian of Global Biodiversity" },
                "Japan": { badge: "Future Heritage", role: "Mastery of Tradition & Tech" }
            };
            return registry[country.name.common] || { badge: "Global Node", role: "Contributor to World Ethos" };
        };

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22, 78], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // --- OFFICIAL INDIA BOUNDARY OVERLAY ---
        // This draws the correct border including POK and Aksai Chin
        fetch('https://raw.githubusercontent.com/datameet/maps/master/Country/india-composite.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: "#f97316", // Tangy Orange
                        weight: 3,
                        fillColor: "#f97316",
                        fillOpacity: 0.05
                    }
                }).addTo(map);
            });

        let countries = [];
        async function init() {
            const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
            countries = await response.json();
            countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
            render(countries);
        }

        function render(data) {
            document.getElementById('list').innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="group flex items-center gap-4 p-5 rounded-[2rem] bg-white/40 border border-transparent hover:border-orange-200 hover:bg-white transition-all cursor-pointer">
                    <span class="text-3xl filter grayscale group-hover:grayscale-0 transition-all">${c.flag}</span>
                    <div><h3 class="text-sm font-extrabold text-slate-800">${c.name.common}</h3><p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">${getEthos(c).badge}</p></div>
                </div>
            `).join('');
        }

        let marker = null;
        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;
            map.flyTo(c.latlng, name === 'India' ? 5 : 6, { duration: 2.5 });
            
            const ethos = getEthos(c);
            const panel = document.getElementById('panel');
            panel.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none', 'scale-90');
            document.getElementById('p-flag').innerText = c.flag;
            document.getElementById('p-ethos').innerText = ethos.badge;
            document.getElementById('p-name').innerText = c.name.common;
            document.getElementById('p-cap').innerText = c.capital?.[0] || 'International Territory';
            document.getElementById('p-pop').innerText = c.population.toLocaleString();
            document.getElementById('p-role').innerText = ethos.role;

            if (marker) map.removeLayer(marker);
            marker = L.marker(c.latlng, { icon: L.divIcon({ className: 'pulse-icon', iconSize: [20, 20] }) }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }
