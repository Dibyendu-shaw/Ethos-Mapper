<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Global Intelligence</title>
    <style>
        :root {
            --dark: #0f172a;
            --primary: #2563eb;
            --accent: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        header { 
            background: var(--dark); color: white; padding: 50px 20px; text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .search-container { text-align: center; padding: 30px 20px; }
        
        input { 
            width: 100%; max-width: 500px; padding: 15px; border-radius: 8px;
            border: 1px solid #cbd5e1; font-size: 1rem; outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .container { 
            max-width: 1200px; margin: auto; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; padding: 20px; 
        }

        .card { 
            background: var(--card); border-radius: 8px; padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-top: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-3px); }
        .card img { width: 60px; height: auto; border-radius: 4px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .card h2 { margin: 0 0 10px 0; font-size: 1.4rem; }

        .section-title { 
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; 
            color: var(--primary); font-weight: 800; margin-top: 15px; display: block;
        }

        .grid-info { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;
            background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 0.85rem;
        }

        .loading, .error { text-align: center; font-size: 1.2rem; margin-top: 40px; padding: 20px; }
        .error { color: #dc2626; background: #fee2e2; border-radius: 8px; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem;}
    </style>
</head>
<body>

<header>
    <h1 style="margin-bottom: 5px;">ETHOS MAPPER</h1>
    <p style="margin-top: 0; color: #94a3b8;">Live Data for Every Country on Earth</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search by Country or Capital...">
</div>

<div class="loading" id="loader">Fetching global data... Please wait 🌍</div>
<div class="error" id="errorMsg" style="display: none;"></div>

<div class="container" id="mainGrid">
    </div>

<footer>
    <p>ETHOS MAPPER | Built for Humanity by an Analyst</p>
</footer>

<script>
    // Fetch live data from the API
    fetch('https://restcountries.com/v3.1/all')
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            document.getElementById('loader').style.display = 'none'; // Hide loader
            
            // Sort countries alphabetically
            data.sort((a, b) => a.name.common.localeCompare(b.name.common));

            const grid = document.getElementById('mainGrid');

            // Loop through all countries
            data.forEach(country => {
                let name = country.name.common;
                let flag = country.flags.svg;
                let capital = country.capital ? country.capital[0] : "None";
                let region = country.region;
                let pop = country.population.toLocaleString();
                let langs = country.languages ? Object.values(country.languages).slice(0,2).join(", ") : "Various";

                let cardHTML = `
                    <div class="card">
                        <img src="${flag}" alt="Flag of ${name}">
                        <h2>${name}</h2>
                        
                        <span class="section-title">Essential Vitals</span>
                        <div class="grid-info">
                            <div>🏛️ <b>Capital:</b> ${capital}</div>
                            <div>🌍 <b>Region:</b> ${region}</div>
                            <div>👥 <b>Pop:</b> ${pop}</div>
                            <div>🗣️ <b>Lang:</b> ${langs}</div>
                        </div>

                        <span class="section-title">Analyst Note</span>
                        <p style="font-size: 0.85rem; color: #475569; margin-bottom: 0;">
                            Part of the <b>${country.subregion || region}</b> zone. 
                        </p>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        })
        .catch(error => {
            document.getElementById('loader').style.display = 'none';
            let errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'block';

        });
