<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Global Intelligence</title>
    <style>
        :root {
            --dark: #0f172a;
            --primary: #2563eb;
            --accent: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        header { 
            background: var(--dark); color: white; padding: 50px 20px; text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .search-container { text-align: center; padding: 30px 20px; }
        
        input { 
            width: 100%; max-width: 500px; padding: 15px; border-radius: 8px;
            border: 1px solid #cbd5e1; font-size: 1rem; outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .container { 
            max-width: 1200px; margin: auto; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; padding: 20px; 
        }

        .card { 
            background: var(--card); border-radius: 8px; padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-top: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-3px); }
        .card h2 { margin: 0 0 10px 0; font-size: 1.4rem; }
        .flag-emoji { font-size: 3.5rem; margin-bottom: 5px; line-height: 1; }

        .section-title { 
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; 
            color: var(--primary); font-weight: 800; margin-top: 15px; display: block;
        }

        .grid-info { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;
            background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 0.85rem;
        }
        
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem;}
    </style>
</head>
<body>

<header>
    <h1 style="margin-bottom: 5px;">ETHOS MAPPER</h1>
    <p style="margin-top: 0; color: #94a3b8;">Instant Data. Zero Load Times.</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search by Country or Capital...">
</div>

<div class="container" id="mainGrid">
    </div>

<footer>
    <p>ETHOS MAPPER | Built for Humanity by Dibyendu </p>
</footer>

<script>
    // THE OFFLINE DATABASE: Hardcoded to bypass network blocks
    const countriesData = [
        { name: "India", flag: "🇮🇳", capital: "New Delhi", region: "Asia", pop: "1.42 Billion", langs: "Hindi, English" },
        { name: "Japan", flag: "🇯🇵", capital: "Tokyo", region: "Asia", pop: "125 Million", langs: "Japanese" },
        { name: "France", flag: "🇫🇷", capital: "Paris", region: "Europe", pop: "67.9 Million", langs: "French" },
        { name: "Brazil", flag: "🇧🇷", capital: "Brasília", region: "Americas", pop: "215.3 Million", langs: "Portuguese" },
        { name: "United States", flag: "🇺🇸", capital: "Washington, D.C.", region: "Americas", pop: "333.2 Million", langs: "English" },
        { name: "South Africa", flag: "🇿🇦", capital: "Pretoria", region: "Africa", pop: "59.8 Million", langs: "Zulu, Xhosa, English" },
        { name: "Australia", flag: "🇦🇺", capital: "Canberra", region: "Oceania", pop: "26.0 Million", langs: "English" },
        { name: "Egypt", flag: "🇪🇬", capital: "Cairo", region: "Africa", pop: "110.9 Million", langs: "Arabic" },
        { name: "Canada", flag: "🇨🇦", capital: "Ottawa", region: "Americas", pop: "38.9 Million", langs: "English, French" },
        { name: "Germany", flag: "🇩🇪", capital: "Berlin", region: "Europe", pop: "83.2 Million", langs: "German" },
        { name: "Mexico", flag: "🇲🇽", capital: "Mexico City", region: "Americas", pop: "127.5 Million", langs: "Spanish" },
        { name: "Italy", flag: "🇮🇹", capital: "Rome", region: "Europe", pop: "58.9 Million", langs: "Italian" },
        { name: "United Kingdom", flag: "🇬🇧", capital: "London", region: "Europe", pop: "67.3 Million", langs: "English" },
        { name: "China", flag: "🇨🇳", capital: "Beijing", region: "Asia", pop: "1.41 Billion", langs: "Mandarin" },
        { name: "Argentina", flag: "🇦🇷", capital: "Buenos Aires", region: "Americas", pop: "46.2 Million", langs: "Spanish" },
        { name: "Nigeria", flag: "🇳🇬", capital: "Abuja", region: "Africa", pop: "213.4 Million", langs: "English, Hausa" },
        { name: "Spain", flag: "🇪🇸", capital: "Madrid", region: "Europe", pop: "47.4 Million", langs: "Spanish" },
        { name: "South Korea", flag: "🇰🇷", capital: "Seoul", region: "Asia", pop: "51.7 Million", langs: "Korean" },
        { name: "Kenya", flag: "🇰🇪", capital: "Nairobi", region: "Africa", pop: "53.0 Million", langs: "Swahili, English" },
        { name: "Saudi Arabia", flag: "🇸🇦", capital: "Riyadh", region: "Asia", pop: "35.9 Million", langs: "Arabic" }
    ];

    // Sort alphabetically automatically
    countriesData.sort((a, b) => a.name.localeCompare(b.name));

    const grid = document.getElementById('mainGrid');

    // Build the grid instantly
    countriesData.forEach(country => {
        let cardHTML = `
            <div class="card">
                <div class="flag-emoji">${country.flag}</div>
                <h2>${country.name}</h2>
                
                <span class="section-title">Essential Vitals</span>
                <div class="grid-info">
                    <div>🏛️ <b>Capital:</b> ${country.capital}</div>
                    <div>🌍 <b>Region:</b> ${country.region}</div>
                    <div>👥 <b>Pop:</b> ${country.pop}</div>
                    <div>🗣️ <b>Lang:</b> ${country.langs}</div>
                </div>

                <span class="section-title">Analyst Note</span>
                <p style="font-size: 0.85rem; color: #475569; margin-bottom: 0;">
                    Part of the <b>${country.region}</b> zone. Safe-loaded from internal database.
                </p>
            </div>
        `;
        grid.innerHTML += cardHTML;
    });

    // Instant Search Filter
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let val = this.value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>

</body>
</html>
