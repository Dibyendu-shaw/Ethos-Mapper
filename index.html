<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Global Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #020617; }
        #map { height: 100vh; width: 100%; filter: hue-rotate(-10deg) brightness(0.8); }
        
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
        .pulse-marker { animation: pulse-cyan 2s infinite; border-radius: 50%; }

        .country-card:hover {
            background: rgba(34, 211, 238, 0.1);
            border-color: #22d3ee;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="text-slate-100 overflow-hidden">

    <div class="flex h-screen w-full relative">
        
        <!-- SIDEBAR -->
        <aside class="absolute top-4 left-4 bottom-4 w-80 md:w-96 glass z-[1001] rounded-3xl flex flex-col shadow-2xl overflow-hidden border border-white/10">
            <div class="p-6 pb-2">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-cyan-500 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(34,211,238,0.6)]">
                        <span class="text-xl">🌐</span>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tighter text-white">ETHOS<span class="text-cyan-400">MAPPER</span></h1>
                </div>

                <div class="relative group">
                    <input type="text" id="search" placeholder="Search countries..." 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-3 px-11 text-sm focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all">
                    <span class="absolute left-4 top-3.5 text-slate-500 group-focus-within:text-cyan-400">🔍</span>
                </div>
            </div>

            <div id="country-list" class="flex-1 overflow-y-auto px-6 py-4 space-y-3">
                <div id="status-message" class="text-center py-10 text-slate-500 animate-pulse text-sm">Initializing global data...</div>
            </div>

            <div class="p-6 bg-cyan-500/5 border-t border-white/5">
                <div class="flex justify-between items-center text-[10px] uppercase tracking-widest text-slate-400">
                    <span>Nodes: <span id="node-count" class="text-cyan-400">0</span></span>
                    <span id="data-source" class="flex items-center gap-1 text-emerald-400">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Online
                    </span>
                </div>
            </div>
        </aside>

        <!-- MAIN MAP -->
        <main class="flex-1">
            <div id="map"></div>
        </main>

        <!-- STATS CARD -->
        <div id="stats-card" class="absolute top-4 right-4 glass p-6 rounded-3xl z-[1001] w-64 hidden border border-cyan-500/30">
            <h2 id="stat-name" class="text-xl font-bold text-white mb-1">Country</h2>
            <p id="stat-capital" class="text-cyan-400 text-xs uppercase mb-4 tracking-widest">Capital</p>
            <div class="space-y-3">
                <div class="flex justify-between items-center"><span class="text-slate-400 text-xs">Population</span><span id="stat-pop" class="text-white font-mono text-sm font-bold">0</span></div>
                <div class="flex justify-between items-center"><span class="text-slate-400 text-xs">Region</span><span id="stat-region" class="text-white text-sm">Earth</span></div>
            </div>
            <button onclick="closeStats()" class="mt-6 w-full py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] uppercase tracking-widest transition">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let allCountries = [];
        const countryListEl = document.getElementById('country-list');
        const searchInput = document.getElementById('search');

        const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);
        map.attributionControl.setPrefix(false);

        // Backup Data in case API fails
        const fallbackData = [
            { name: { common: "India" }, flag: "🇮🇳", population: 1408000000, region: "Asia", latlng: [20, 77], capital: ["New Delhi"] },
            { name: { common: "United States" }, flag: "🇺🇸", population: 331000000, region: "Americas", latlng: [38, -97], capital: ["Washington D.C."] },
            { name: { common: "United Kingdom" }, flag: "🇬🇧", population: 67000000, region: "Europe", latlng: [55, -3], capital: ["London"] },
            { name: { common: "Australia" }, flag: "🇦🇺", population: 25000000, region: "Oceania", latlng: [-25, 133], capital: ["Canberra"] },
            { name: { common: "Brazil" }, flag: "🇧🇷", population: 214000000, region: "Americas", latlng: [-10, -51], capital: ["Brasília"] },
            { name: { common: "Germany" }, flag: "🇩🇪", population: 83000000, region: "Europe", latlng: [51, 9], capital: ["Berlin"] },
            { name: { common: "Japan" }, flag: "🇯🇵", population: 125000000, region: "Asia", latlng: [36, 138], capital: ["Tokyo"] }
        ];

        async function fetchCountries() {
            try {
                // Try API
                const res = await fetch('https://restcountries.com/v3.1/all', { signal: AbortSignal.timeout(5000) });
                if (!res.ok) throw new Error();
                const data = await res.json();
                allCountries = data.sort((a, b) => a.name.common.localeCompare(b.name.common));
                renderList(allCountries);
            } catch (err) {
                // If API fails, use Backup Data
                console.log("Using Fallback Data");
                allCountries = fallbackData;
                document.getElementById('data-source').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Offline Mode';
                document.getElementById('data-source').classList.replace('text-emerald-400', 'text-amber-400');
                renderList(allCountries);
            }
            document.getElementById('node-count').innerText = allCountries.length;
        }

        function renderList(list) {
            countryListEl.innerHTML = '';
            list.forEach(country => {
                const card = document.createElement('div');
                card.className = "country-card p-4 rounded-2xl border border-white/5 cursor-pointer transition-all flex items-center gap-4 bg-slate-800/20";
                card.innerHTML = `<span class="text-2xl">${country.flag}</span><div><h3 class="text-sm font-bold text-white">${country.name.common}</h3><p class="text-[10px] text-slate-500 uppercase tracking-tighter">${country.region}</p></div>`;
                card.onclick = () => focusCountry(country);
                countryListEl.appendChild(card);
            });
        }

        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allCountries.filter(c => c.name.common.toLowerCase().includes(val) || c.region.toLowerCase().includes(val));
            renderList(filtered);
        };

        let currentMarker = null;
        function focusCountry(c) {
            if (currentMarker) map.removeLayer(currentMarker);
            const latlng = c.latlng;
            map.flyTo(latlng, 5, { duration: 2 });
            
            document.getElementById('stats-card').classList.remove('hidden');
            document.getElementById('stat-name').innerText = c.name.common;
            document.getElementById('stat-capital').innerText = c.capital ? c.capital[0] : 'N/A';
            document.getElementById('stat-pop').innerText = c.population.toLocaleString();
            document.getElementById('stat-region').innerText = c.region;

            currentMarker = L.circleMarker(latlng, {
                radius: 15,
                className: 'pulse-marker',
                fillColor: '#22d3ee',
                color: '#fff',
                weight: 2,
                fillOpacity: 0.9
            }).addTo(map);
        }

        function closeStats() {
            document.getElementById('stats-card').classList.add('hidden');
            if (currentMarker) map.removeLayer(currentMarker);
        }

        fetchCountries();
    </script>
</body>
</html>
