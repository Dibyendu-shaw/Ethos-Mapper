<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS MAPPER | Global Recognitions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f0f9ff; }
        #map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .ui-wrapper { position: relative; z-index: 100; pointer-events: none; height: 100vh; width: 100vw; }
        .interactive { pointer-events: auto; }

        .glass-ui {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .pulse-icon {
            width: 18px; height: 18px; background: #f97316;
            border: 3px solid white; border-radius: 50%;
            animation: ring-pulse 1.5s infinite;
        }
        @keyframes ring-pulse {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .btn-tangy {
            background: #0f172a; color: white; transition: all 0.2s;
        }
        .btn-tangy:hover { background: #f97316; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- MAP CONTAINER -->
    <div id="map"></div>

    <!-- UI OVERLAY -->
    <div class="ui-wrapper flex">
        
        <!-- SIDEBAR -->
        <aside class="interactive m-6 w-80 md:w-96 glass-ui rounded-[2.5rem] flex flex-col overflow-hidden">
            <div class="p-8 pb-4">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-gradient-to-tr from-orange-500 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                        <span class="text-2xl text-white">🟠</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight leading-none text-slate-900">ETHOS<span class="text-orange-500">MAPPER</span></h1>
                        <p class="text-[9px] uppercase tracking-[0.2em] font-bold text-slate-400 mt-1">Sovereign Global Registry</p>
                    </div>
                </div>

                <div class="relative bg-white border border-slate-200 rounded-2xl overflow-hidden mb-4">
                    <input type="text" id="search" placeholder="Search (e.g. India)..." class="w-full bg-transparent py-4 px-12 text-sm font-medium outline-none">
                    <span class="absolute left-5 top-4">🔍</span>
                </div>

                <button onclick="teleport()" class="btn-tangy w-full py-4 rounded-2xl text-[10px] font-extrabold tracking-[0.2em]">
                    🎲 SURPRISE ME
                </button>
            </div>

            <div id="list" class="flex-1 overflow-y-auto px-6 py-2 space-y-3 no-scrollbar pb-10">
                <div class="text-center py-10 text-slate-400 text-xs animate-pulse">Scanning Global Nodes...</div>
            </div>
        </aside>

        <!-- DATA PANEL -->
        <div id="panel" class="interactive absolute bottom-10 right-10 w-80 glass-ui p-8 rounded-[3rem] transition-all transform translate-y-20 opacity-0 pointer-events-none">
            <div class="flex justify-center mb-4"><span id="p-flag" class="text-6xl"></span></div>
            <div class="text-center mb-6">
                <span id="p-ethos" class="bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-2 inline-block tracking-widest">Value</span>
                <h2 id="p-name" class="text-2xl font-extrabold text-slate-900 leading-none">Country</h2>
                <p id="p-cap" class="text-orange-500 text-[10px] font-bold uppercase mt-2">Capital</p>
            </div>
            <div class="space-y-3 bg-white/50 rounded-[1.5rem] p-5 border border-orange-100">
                <div class="flex justify-between"><span class="text-slate-400 text-[10px] font-bold uppercase">Population</span><span id="p-pop" class="text-slate-900 font-bold text-xs">--</span></div>
                <div class="flex justify-between border-t border-orange-100 pt-2"><span class="text-slate-400 text-[10px] font-bold uppercase">Role</span><span id="p-role" class="text-orange-600 font-bold text-[10px] uppercase text-right">--</span></div>
            </div>
            <button onclick="closePanel()" class="mt-4 w-full text-slate-400 text-[10px] font-bold uppercase tracking-widest">Close</button>
        </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize Map
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22, 78], 4);

        // 2. Load Tiles (Using a more robust source)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const getEthos = (name) => {
            const registry = {
                "India": { badge: "Knowledge Hub", role: "Unified Cultural Core" },
                "Brazil": { badge: "Lungs of Earth", role: "Biodiversity Guardian" },
                "Japan": { badge: "Future Heritage", role: "Tradition & Tech Mastery" }
            };
            return registry[name] || { badge: "Global Node", role: "Ethos Contributor" };
        };

        let countries = [];
        let marker = null;

        // 3. Main Init
        async function init() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,flag,latlng,population,region,capital');
                countries = await response.json();
                countries.sort((a, b) => a.name.common.localeCompare(b.name.common));
                render(countries);
            } catch (e) {
                // If API fails, create a minimal fallback so it doesn't stay blank
                countries = [{name:{common:"India"}, flag:"🇮🇳", latlng:[20, 77], population:1408000000, region:"Asia", capital:["New Delhi"]}];
                render(countries);
            }
        }

        function render(data) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = data.map(c => `
                <div onclick="focusCountry('${c.name.common.replace("'", "\\'")}')" class="group flex items-center gap-4 p-4 rounded-2xl bg-white/50 hover:bg-white border border-transparent hover:border-orange-200 transition-all cursor-pointer">
                    <span class="text-2xl">${c.flag}</span>
                    <div><h3 class="text-sm font-bold text-slate-800">${c.name.common}</h3><p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest">${getEthos(c.name.common).badge}</p></div>
                </div>
            `).join('');
        }

        function focusCountry(name) {
            const c = countries.find(x => x.name.common === name);
            if (!c) return;
            map.flyTo(c.latlng, 5, { duration: 2 });
            
            const ethos = getEthos(c.name.common);
            const panel = document.getElementById('panel');
            panel.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            
            document.getElementById('p-flag').innerText = c.flag;
            document.getElementById('p-ethos').innerText = ethos.badge;
            document.getElementById('p-name').innerText = c.name.common;
            document.getElementById('p-cap').innerText = c.capital?.[0] || 'N/A';
            document.getElementById('p-pop').innerText = c.population.toLocaleString();
            document.getElementById('p-role').innerText = ethos.role;

            if (marker) map.removeLayer(marker);
            marker = L.marker(c.latlng, { icon: L.divIcon({ className: 'pulse-icon', iconSize: [18, 18] }) }).addTo(map);
        }

        function teleport() {
            const random = countries[Math.floor(Math.random() * countries.length)];
            focusCountry(random.name.common);
        }

        function closePanel() {
            document.getElementById('panel').classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            if (marker) map.removeLayer(marker);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = countries.filter(c => c.name.common.toLowerCase().includes(val));
            render(filtered);
        });

        // Trigger resize to fix blank map issues
        window.addEventListener('load', () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
            init();
        });
    </script>
</body>
</html>
