<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Global Analyst Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        :root {
            --dark: #0a0e27;
            --dark-secondary: #0f1535;
            --panel: #1a1f3a;
            --panel-light: #222d4f;
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --accent: #ff006e;
            --accent-glow: #ff006e44;
            --text-light: #f5f7fa;
            --text-muted: #8b93a6;
            --success: #00d97e;
        }

        html, body { 
            margin: 0; 
            padding: 0;
            font-family: 'Poppins', sans-serif; 
            background: var(--dark); 
            color: var(--text-light); 
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 30%, #1a3a52 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #2a1a3a 0%, transparent 40%);
            animation: drift 25s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* Navigation Bar */
        .navbar {
            background: linear-gradient(135deg, #0a0e27cc 0%, #1a1f3acc 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #00d4ff22;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #00d97e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.5px;
        }

        .navbar-stats {
            display: flex;
            gap: 30px;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: #00d4ff;
        }

        .stat-label {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.7rem;
        }

        /* Main Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            padding: 40px;
            max-width: 1600px;
            margin: auto;
        }

        @media (min-width: 1100px) {
            .dashboard {
                grid-template-columns: 500px 1fr;
                align-items: start;
            }
        }

        /* LEFT PANEL: Globe Section */
        .left-panel {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1535 100%);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            box-shadow: 
                0 25px 50px rgba(0, 212, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid #00d4ff22;
            position: sticky;
            top: 100px;
            animation: fadeInLeft 1s ease-out;
        }

        @keyframes fadeInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .left-panel h1 { 
            margin: 0 0 8px 0; 
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; 
            background: linear-gradient(135deg, #00d4ff 0%, #00d97e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .left-panel p { 
            margin: 0 0 25px 0; 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            font-weight: 300;
        }

        #globeViz {
            width: 100%;
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            background: #000814;
            cursor: grab;
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.15);
            border: 1px solid #00d4ff11;
            transition: box-shadow 0.3s ease;
        }

        #globeViz:active { cursor: grabbing; }
        #globeViz:hover { box-shadow: 0 20px 50px rgba(0, 212, 255, 0.25); }

        .globe-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* RIGHT PANEL: Controls & Cards */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: fadeInRight 1s ease-out;
        }

        @keyframes fadeInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Search & Filter Section */
        .search-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-wrapper {
            position: relative;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px 20px 16px 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1a1f3a 0%, #222d4f 100%);
            border: 2px solid #00d4ff22;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input[type="text"]:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder { color: #64748b; }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* Filter Buttons */
        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 18px;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a1f3a 0%, #222d4f 100%);
            border: 1.5px solid #00d4ff22;
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #00d4ff 0%, #00d97e 100%);
            border-color: var(--primary);
            color: #0a0e27;
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        /* Grid & Cards */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px;
            animation: gridFadeIn 0.8s ease-out;
        }

        @keyframes gridFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card { 
            background: linear-gradient(135deg, #1a1f3a 0%, #222d4f 100%);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #00d4ff22;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardSlide 0.6s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
        .card:nth-child(n+7) { animation-delay: 0.35s; }

        @keyframes cardSlide {
            from { 
                transform: translateY(30px); 
                opacity: 0;
            }
            to { 
                transform: translateY(0); 
                opacity: 1;
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00d4ff11, transparent);
            transition: left 0.6s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 20px 40px rgba(0, 212, 255, 0.2),
                inset 0 1px 0 rgba(0, 212, 255, 0.2);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h2 { 
            margin: 0;
            font-size: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .flag-emoji { 
            font-size: 2.5rem;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .card-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .meta-badge {
            font-size: 0.7rem;
            padding: 5px 10px;
            background: #00d4ff11;
            border-radius: 8px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid #00d4ff22;
        }

        .grid-info { 
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            background: #0a0e2755;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #cbd5e1;
            border-left: 3px solid var(--primary);
        }

        .grid-info div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .grid-info b { 
            color: var(--primary);
            font-weight: 600;
        }

        .card-action {
            margin-top: 16px;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff11 0%, #00d97e11 100%);
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
            border: 1px solid #00d4ff22;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-action:hover {
            background: linear-gradient(135deg, #00d4ff22 0%, #00d97e22 100%);
            border-color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1f3a 0%, #222d4f 100%);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #00d4ff22;
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #00d4ff22;
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .modal-flag {
            font-size: 3rem;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--accent);
            transform: rotate(90deg);
        }

        .modal-section {
            margin-bottom: 25px;
        }

        .modal-section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-section-content {
            background: #0a0e2755;
            padding: 16px;
            border-radius: 12px;
            border-left: 3px solid var(--primary);
            color: #cbd5e1;
        }

        .modal-section-content div {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-section-content label {
            color: var(--primary);
            font-weight: 600;
        }

        /* No results message */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .left-panel {
                position: static;
                border-radius: 20px;
                padding: 25px;
            }

            .navbar-stats {
                font-size: 0.75rem;
                gap: 15px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #00d4ff44;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff66;
        }
    </style>
</head>

<!-- Navigation Bar -->
<div class="navbar">
    <div class="navbar-brand">🌍 ETHOS MAPPER</div>
    <div class="navbar-stats">
        <div class="stat-item">
            <div class="stat-value">195+</div>
            <div class="stat-label">Countries</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">8.1B+</div>
            <div class="stat-label">Population</div>

        <div class="stat-item">
            <div class="stat-value">All</div>
            <div class="stat-label">Regions</div>
        </div>
    </div>
</div>

<!-- Main Dashboard -->
<div class="dashboard">

    <div class="left-panel">

        <div id="globeViz"></div>

    <div class="right-panel">

        <div class="search-section">

                <input type="text" id="searchInput" placeholder="Search by country, capital, or region...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All Countries</button>
                <button class="filter-btn" data-filter="Asia">Asia</button>

                <button class="filter-btn" data-filter="Africa">Africa</button>

        <!-- Cards Grid -->
        <div class="grid" id="mainGrid"></div>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <p>📍 No countries found. Try adjusting your search or filters.</p>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">

        <div class="modal-header">
            <div class="modal-title">

                <div id="modalCountry"></div>

            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        
        <div class="modal-section">
            <div class="modal-section-title">📍 Location & Geography</div>
            <div class="modal-section-content">
                <div>
                    <label>Capital:</label>
                    <span id="modalCapital"></span>
                </div>
                <div>
                    <label>Region:</label>
                    <span id="modalRegion"></span>
                </div>
                <div>
                    <label>Coordinates:</label>
                    <span id="modalCoords"></span>
                </div>
            </div>
        </div>

        <div class="modal-section">
            <div class="modal-section-title">👥 Demographics</div>
            <div class="modal-section-content">
                <div>
                    <label>Population:</label>
                    <span id="modalPop"></span>
                </div>
                <div>
                    <label>Languages:</label>
                    <span id="modalLangs"></span>
                </div>
            </div>
        </div>

        <div class="modal-section">
            <div class="modal-section-title">✨ Quick Facts</div>
            <div class="modal-section-content">
                <p id="modalFact" style="margin: 0; line-height: 1.6;"></p>
            </div>
        </div>
    </div>
</div>

    function initGlobe() {
        const container = document.getElementById('globeViz');

        scene = new THREE.Scene();

        camera.position.z = 2.5;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000814);
        container.appendChild(renderer.domElement);

        // Create Earth sphere
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        
        // Create a simple earth texture
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#1a4d7a');
        gradient.addColorStop(0.5, '#2a7ab8');
        gradient.addColorStop(1, '#1a4d7a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Add continents (simplified)
        ctx.fillStyle = '#2d5a3d';
        for (let i = 0; i < 100; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const size = Math.random() * 50 + 20;
            ctx.fillRect(x, y, size, size);
        }

        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.MeshPhongMaterial({ map: texture });
        globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 3, 5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Add country points
        countriesData.forEach(country => {
            const lat = (country.lat * Math.PI) / 180;
            const lng = (country.lng * Math.PI) / 180;
            
            const x = Math.cos(lat) * Math.cos(lng);
            const y = Math.sin(lat);
            const z = Math.cos(lat) * Math.sin(lng);

            const pointGeometry = new THREE.SphereGeometry(0.03, 32, 32);
            const pointMaterial = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
            const point = new THREE.Mesh(pointGeometry, pointMaterial);
            point.position.set(x, y, z);
            point.userData.country = country;
            globe.add(point);
        });

        // Auto-rotate
        let autoRotate = true;

        function animate() {
            requestAnimationFrame(animate);
            
            if (autoRotate) {
                globe.rotation.y += 0.0005;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        return { globe, scene, camera, renderer, setAutoRotate: (val) => { autoRotate = val; } };
    }

            const lat = (country.lat * Math.PI) / 180;
            const lng = (country.lng * Math.PI) / 180;
            
            const targetX = Math.cos(lat) * Math.cos(lng) * 2.5;
            const targetY = Math.sin(lat) * 2.5;
            const targetZ = Math.cos(lat) * Math.sin(lng) * 2.5;

            let progress = 0;
            const startX = globeInstance.camera.position.x;
            const startY = globeInstance.camera.position.y;
            const startZ = globeInstance.camera.position.z;

            const animateCamera = () => {
                progress += 0.02;
                if (progress <= 1) {
                    globeInstance.camera.position.x = startX + (targetX - startX) * progress;
                    globeInstance.camera.position.y = startY + (targetY - startY) * progress;
                    globeInstance.camera.position.z = startZ + (targetZ - startZ) * progress;
                    globeInstance.camera.lookAt(0, 0, 0);
                    requestAnimationFrame(animateCamera);
                }
            };
            animateCamera();
        });

        card.addEventListener('mouseleave', () => {
            globeInstance.setAutoRotate(true);
            
            let progress = 0;
            const startX = globeInstance.camera.position.x;
            const startY = globeInstance.camera.position.y;
            const startZ = globeInstance.camera.position.z;
            const targetX = 0;
            const targetY = 0;
            const targetZ = 2.5;

            const animateCamera = () => {
                progress += 0.01;
                if (progress <= 1) {
                    globeInstance.camera.position.x = startX + (targetX - startX) * progress;
                    globeInstance.camera.position.y = startY + (targetY - startY) * progress;
                    globeInstance.camera.position.z = startZ + (targetZ - startZ) * progress;
                    globeInstance.camera.lookAt(0, 0, 0);
                    requestAnimationFrame(animateCamera);
                }
            };
            animateCamera();
        });

        // Modal on click
        card.addEventListener('click', () => {
            openModal(country);
        });

        grid.appendChild(card);
    });

    // 3. MODAL FUNCTIONS
    function openModal(country) {
        document.getElementById('modalFlag').textContent = country.flag;
        document.getElementById('modalCountry').textContent = country.name;
        document.getElementById('modalCapital').textContent = country.capital;
        document.getElementById('modalRegion').textContent = country.region;
        document.getElementById('modalCoords').textContent = `${country.lat.toFixed(2)}°, ${country.lng.toFixed(2)}°`;
        document.getElementById('modalPop').textContent = country.pop;
        document.getElementById('modalLangs').textContent = country.langs;
        document.getElementById('modalFact').textContent = country.fact;
        
        document.getElementById('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    document.getElementById('detailModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // 4. SEARCH FUNCTIONALITY
    document.getElementById('searchInput').addEventListener('keyup', function() {
        filterCards();
    });

    // 5. FILTER FUNCTIONALITY
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            filterCards();
        });
    });

    function filterCards() {
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        let visibleCount = 0;

        document.querySelectorAll('.card').forEach(card => {
            const country = card.dataset.country.toLowerCase();
            const region = card.dataset.region;
            const text = card.innerText.toLowerCase();
            
            const matchesSearch = text.includes(searchVal);
            const matchesFilter = currentFilter === 'all' || region === currentFilter;

            if (matchesSearch && matchesFilter) {
                card.style.display = '';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        // Show/hide no results message
        document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
    }
</script>
