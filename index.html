<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Mapper | Analyst Dashboard</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        :root {
            --dark: #0b1120;
            --panel: #1e293b;
            --primary: #3b82f6;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            background: var(--dark); 
            color: var(--text-light); 
        }

        /* The Dashboard Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }

        /* Desktop view: Split screen */
        @media (min-width: 900px) {
            .dashboard {
                grid-template-columns: 450px 1fr;
                align-items: start;
            }
            .left-panel {
                position: sticky;
                top: 20px;
            }
        }

        /* LEFT PANEL: The Globe */
        .left-panel {
            background: var(--panel);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .left-panel h1 { margin: 0 0 5px 0; font-size: 1.8rem; color: var(--primary); letter-spacing: 1px; }
        .left-panel p { margin: 0 0 20px 0; font-size: 0.9rem; color: var(--text-muted); }

        #globeViz {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            cursor: grab;
        }
        #globeViz:active { cursor: grabbing; }

        /* RIGHT PANEL: Search & Cards */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input { 
            width: 100%; box-sizing: border-box; padding: 18px 20px; border-radius: 12px;
            background: var(--panel); border: 1px solid #334155; color: white;
            font-size: 1.1rem; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        input::placeholder { color: #64748b; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        /* Interactive Cards */
        .card { 
            background: var(--panel); border-radius: 12px; padding: 20px; 
            border: 1px solid #334155; border-top: 4px solid var(--primary);
            transition: all 0.3s ease; cursor: pointer;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
            border-color: var(--primary);
        }

        .card h2 { margin: 0 0 10px 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .flag-emoji { font-size: 2rem; line-height: 1; }

        .section-title { 
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; 
            color: var(--primary); font-weight: 800; margin-top: 15px; display: block;
        }

        .grid-info { 
            display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px;
            background: #0f172a; padding: 12px; border-radius: 8px; font-size: 0.85rem; color: #cbd5e1;
        }
        
        .grid-info b { color: white; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="left-panel">
        <h1>ETHOS MAPPER</h1>
        <p>Hover over any card to scan location.</p>
        <div id="globeViz"></div>
    </div>

    <div class="right-panel">
        <input type="text" id="searchInput" placeholder="Search by Country or Capital...">
        
        <div class="grid" id="mainGrid">
            </div>
    </div>
</div>

<script>
    const countriesData = [
        { name: "India", lat: 20.5937, lng: 78.9629, flag: "🇮🇳", capital: "New Delhi", region: "Asia", pop: "1.42 B", langs: "Hindi, English" },
        { name: "Japan", lat: 36.2048, lng: 138.2529, flag: "🇯🇵", capital: "Tokyo", region: "Asia", pop: "125 M", langs: "Japanese" },
        { name: "France", lat: 46.2276, lng: 2.2137, flag: "🇫🇷", capital: "Paris", region: "Europe", pop: "67.9 M", langs: "French" },
        { name: "Brazil", lat: -14.2350, lng: -51.9253, flag: "🇧🇷", capital: "Brasília", region: "Americas", pop: "215.3 M", langs: "Portuguese" },
        { name: "United States", lat: 37.0902, lng: -95.7129, flag: "🇺🇸", capital: "Washington, D.C.", region: "Americas", pop: "333.2 M", langs: "English" },
        { name: "South Africa", lat: -30.5595, lng: 22.9375, flag: "🇿🇦", capital: "Pretoria", region: "Africa", pop: "59.8 M", langs: "Zulu, English" },
        { name: "Australia", lat: -25.2744, lng: 133.7751, flag: "🇦🇺", capital: "Canberra", region: "Oceania", pop: "26.0 M", langs: "English" },
        { name: "Egypt", lat: 26.8206, lng: 30.8025, flag: "🇪🇬", capital: "Cairo", region: "Africa", pop: "110.9 M", langs: "Arabic" },
        { name: "Canada", lat: 56.1304, lng: -106.3468, flag: "🇨🇦", capital: "Ottawa", region: "Americas", pop: "38.9 M", langs: "English, French" },
        { name: "Germany", lat: 51.1657, lng: 10.4515, flag: "🇩🇪", capital: "Berlin", region: "Europe", pop: "83.2 M", langs: "German" }
    ];

    // 1. INITIALIZE GLOBE
    const GlobeViz = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg') 
        .backgroundColor('#1e293b') // Matches the panel color smoothly
        .pointsData(countriesData)
        .pointAltitude(0.05)
        .pointColor(() => '#fdbb2d')
        .pointRadius(0.8)
        .pointLabel('name'); 

    // Initial slow spin
    GlobeViz.controls().autoRotate = true;
    GlobeViz.controls().autoRotateSpeed = 1.0;

    // 2. BUILD CARDS WITH HOVER INTERACTION
    countriesData.sort((a, b) => a.name.localeCompare(b.name));
    const grid = document.getElementById('mainGrid');

    countriesData.forEach(country => {
        // Create the card element
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h2><span class="flag-emoji">${country.flag}</span> ${country.name}</h2>
            <div class="grid-info">
                <div>🏛️ <b>Capital:</b> ${country.capital}</div>
                <div>🌍 <b>Region:</b> ${country.region}</div>
                <div>👥 <b>Pop:</b> ${country.pop}</div>
            </div>
        `;

        // THE MAGIC TRICK: Spin globe when hovering over the card
        card.addEventListener('mouseenter', () => {
            GlobeViz.controls().autoRotate = false; // Stop the auto-spin
            GlobeViz.pointOfView({ lat: country.lat, lng: country.lng, altitude: 1.5 }, 1000); // Zoom to country in 1 second
        });

        // Resume spinning when mouse leaves
        card.addEventListener('mouseleave', () => {
            GlobeViz.controls().autoRotate = true;
        });

        grid.appendChild(card);
    });

    // 3. SEARCH FUNCTION
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let val = this.value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>

</body>
</html>
